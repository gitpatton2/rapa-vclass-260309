---
- name: Deploy Ansible Lab
  hosts: localhost
  gather_facts: no
  vars:
    ansible_python_interpreter: /bin/python3
    vcenter_hostname: "vcsa.vclass.rapa"
    vcenter_username: "s00@vsphere.rapa"
    vcenter_password: "VMware123!"
    datacenter_name: "RAPA" 
    esxi_username: "root"
    esxi_password: "VMware123!"
    parent_folder: "4.Clone/" 
    snapshot_name: "Setup"

    LAB_SID: 
    # - { id: S00, host: esx-01.vclass.rapa, ds: vSAN-ESX-01, Temp_DC: Temp-DC-1 }
    # - { id: S01, host: esx-01.vclass.rapa, ds: vSAN-ESX-01, Temp_DC: Temp-DC-1 }
    # - { id: S02, host: esx-01.vclass.rapa, ds: vSAN-ESX-01, Temp_DC: Temp-DC-1 }
    # - { id: S03, host: esx-01.vclass.rapa, ds: vSAN-ESX-01, Temp_DC: Temp-DC-1 }
    # - { id: S04, host: esx-01.vclass.rapa, ds: vSAN-ESX-01, Temp_DC: Temp-DC-1 }
    # - { id: S05, host: esx-01.vclass.rapa, ds: vSAN-ESX-01, Temp_DC: Temp-DC-1 }
    # - { id: S06, host: esx-01.vclass.rapa, ds: vSAN-ESX-01, Temp_DC: Temp-DC-1 }
    # - { id: S07, host: esx-01.vclass.rapa, ds: vSAN-ESX-01, Temp_DC: Temp-DC-1 }
    # - { id: S08, host: esx-01.vclass.rapa, ds: vSAN-ESX-01, Temp_DC: Temp-DC-1 }
    # - { id: S09, host: esx-02.vclass.rapa, ds: vSAN-ESX-02, Temp_DC: Temp-DC-2 }
    # - { id: S10, host: esx-02.vclass.rapa, ds: vSAN-ESX-02, Temp_DC: Temp-DC-2 }
    # - { id: S11, host: esx-02.vclass.rapa, ds: vSAN-ESX-02, Temp_DC: Temp-DC-2 }
    # - { id: S12, host: esx-02.vclass.rapa, ds: vSAN-ESX-02, Temp_DC: Temp-DC-2 }
    # - { id: S13, host: esx-02.vclass.rapa, ds: vSAN-ESX-02, Temp_DC: Temp-DC-2 }
    # - { id: S14, host: esx-02.vclass.rapa, ds: vSAN-ESX-02, Temp_DC: Temp-DC-2 }
    # - { id: S15, host: esx-02.vclass.rapa, ds: vSAN-ESX-02, Temp_DC: Temp-DC-2 }
    # - { id: S16, host: esx-02.vclass.rapa, ds: vSAN-ESX-02, Temp_DC: Temp-DC-2 }
    # - { id: S17, host: esx-02.vclass.rapa, ds: vSAN-ESX-02, Temp_DC: Temp-DC-2 }

    portgroup_definitions:
      - { suffix: "Mgmt", vlan: 10 }
      - { suffix: "Storage", vlan: 11 }
      - { suffix: "vMotion", vlan: 12 }


  tasks:
  - name: 01. Shutdown Lab DC vm
    community.vmware.vmware_guest:
      hostname: "{{ vcenter_hostname }}"
      username: "{{ vcenter_username }}"
      password: "{{ vcenter_password }}"
      validate_certs: no
      name: "{{ item.id }}-DC"
      state: "shutdownguest"
    loop: "{{ LAB_SID }}"
    delegate_to: localhost

  - name: 02. Remove Lab DC vm
    community.vmware.vmware_guest:
      hostname: "{{ vcenter_hostname }}"
      username: "{{ vcenter_username }}"
      password: "{{ vcenter_password }}"
      name: "{{ item.id }}-DC"
      datacenter: "{{ datacenter_name }}"
      folder: "{{ parent_folder }}{{ item.id }}"
    loop: "{{ LAB_SID }}"
    delegate_to: localhost

  - name: 03. Remove LAB Standard vSwitch
    community.vmware.vmware_vswitch:
      hostname: "{{ item.host }}"
      username: "{{ esxi_username }}"
      password: "{{ esxi_password }}"
      switch: "{{ item.id }}"
      state: absent
      security:
        promiscuous_mode: True
        mac_changes: True
        forged_transmits: True      
    loop: "{{ LAB_SID }}"
    delegate_to: localhost

  - name: 04. Change Permission to VM folder
    community.vmware.vmware_object_role_permission:
      hostname: "{{ vcenter_hostname }}"
      username: "{{ vcenter_username }}"
      password: "{{ vcenter_password }}"
      role: NoAccess
      principal: "vsphere.rapa\\{{ item.id }}"
      object_name: '{{ item.id }}'
      state: present
    loop: "{{ LAB_SID }}"
    delegate_to: localhost

  - name: 05. Remove LAB VM Folder
    community.vmware.vcenter_folder:
      hostname: "{{ vcenter_hostname }}"
      username: "{{ vcenter_username }}"
      password: "{{ vcenter_password }}"
      datacenter: "{{ datacenter_name }}"
      folder_type: vm
      folder_name: "{{ item.id }}"
      parent_folder: "{{ parent_folder }}"
      state: absent
    loop: "{{ LAB_SID }}"
    delegate_to: localhost





